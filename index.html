<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>unfold</title>

<link rel="stylesheet" href="main.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playwrite+DK+Uloopet+Guides&family=Questrial&family=Caveat&display=swap" rel="stylesheet">
</head>

<body id="body">

<div class="overlay">

    <!-- TOP -->
    <div class="top-bar">
        <h2 class="title">unfold</h2>
        <div class="quote" id="quote"></div>
    </div>

    <!-- JOURNAL -->
    <div class="journal">

        <h1>today's entry</h1>
        <p class="subtext">a space to slow down and reflect</p>

        <input type="date" id="date">

        <div class="moods" id="moods">
            <p>how are you feeling today?</p>
            <span>😊</span>
            <span>😌</span>
            <span>😔</span>
            <span>😡</span>
            <span>😴</span>
        </div>

        <input type="text" id="gratitude" placeholder="something you're grateful for...">

        <textarea id="entry" placeholder="write your thoughts..."></textarea>

        <button onclick="saveEntry()">save entry</button>

        <div class="entries" id="entries"></div>

    </div>

</div>

<!-- CONTROLS -->
<div class="controls">

    <select onchange="changeBackground(this.value)">
        <option value="images/cozy-cafe.jpg">cozy cafe</option>
        <option value="images/rainy-window.jpg">rainy window</option>
        <option value="images/cotton-balls.jpg">clouds</option>
        <option value="images/sunset.jpg">sunset</option>
    </select>

    <select onchange="changeSound(this.value)">
        <option value="music/floating_away.mp3">floating away</option>
        <option value="music/jazzy-cafe.mp3">late night</option>
        <option value="music/lofi-rain.mp3">rainy day</option>
    </select>

    <button onclick="toggleSound()" id="soundBtn">play</button>

    <input type="range" min="0" max="1" step="0.01" value="0.5" onchange="setVolume(this.value)">

</div>

<script src="script.js"></script>

</body>
</html>
